name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      # NOTE: do NOT set registry-url here. It makes setup-node write an
      # .npmrc with `_authToken=${NODE_AUTH_TOKEN}` + always-auth, which makes
      # npm attempt (empty) token auth instead of falling back to OIDC trusted
      # publishing. With no token .npmrc present, npm performs the OIDC exchange.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # OIDC trusted publishing + provenance requires npm >= 11.5.1.
      # Node 22 ships npm 10.x, so upgrade before publishing.
      - run: npm install -g npm@latest
      - name: Show tool versions
        run: |
          node -v
          npm -v
          echo "id-token request url present: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"
      - run: npm ci
      - run: npm run build
      # Publish each package individually. `npm publish --workspaces` does NOT
      # engage npm's OIDC trusted-publishing code path (it errors ENEEDAUTH),
      # so we loop and run a plain single-package publish from each dir, which
      # does perform the OIDC credential exchange. dist is already built above,
      # so --ignore-scripts skips the redundant prepublishOnly rebuild (whose
      # prebuild step uses --workspace=@oked/sdk and only works from the root).
      - name: Publish packages (OIDC trusted publishing, per-package)
        run: |
          for dir in packages/sdk packages/claude-code packages/claude-agent-sdk packages/openclaw packages/openclaw-cli; do
            echo "::group::publish $dir"
            ( cd "$dir" && npm publish --access public --provenance --ignore-scripts )
            echo "::endgroup::"
          done
