name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # OIDC trusted publishing + provenance requires npm >= 11.5.1.
      # Node 22 ships npm 10.x, so upgrade before publishing.
      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      # Authenticates via OIDC trusted publishing (configured per-package on npmjs).
      # No NPM_TOKEN secret is used. publish:all passes --provenance.
      - run: npm run publish:all
