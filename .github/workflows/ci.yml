name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test --workspaces --if-present
      # Packaging sanity check: confirms every package's `files` allowlist
      # resolves and produces a tarball before any release.
      - run: npm pack --dry-run --workspaces

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Non-blocking for now: surfaces high/critical advisories without
      # failing the build. Flip to a hard gate once the tree is clean.
      - run: npm audit --audit-level=high || true
